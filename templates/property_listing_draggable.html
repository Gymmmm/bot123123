<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拖拽卡片风-房源封面</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 1600px;
        height: 1200px;
        overflow: hidden;
        background: #0a1628;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        color: #fff;
      }

      /* ── 全屏背景 ── */
      .poster {
        position: relative;
        width: 1600px;
        height: 1200px;
        overflow: hidden;
        background: #0a1628;
      }
      .bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 30%;
      }

      /* ── 底部渐变遮罩 ── */
      .veil {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(8, 18, 36, 0.08) 0%,
          rgba(8, 18, 36, 0.18) 40%,
          rgba(8, 18, 36, 0.72) 68%,
          rgba(6, 14, 28, 0.96) 100%
        );
      }

      /* ── 左侧边条（模拟「还有更多图」） ── */
      .side-strip {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 56px;
        background: linear-gradient(
          90deg,
          rgba(6, 14, 28, 0) 0%,
          rgba(6, 14, 28, 0.72) 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      .side-strip .arrow {
        font-size: 30px;
        color: rgba(255, 255, 255, 0.62);
        user-select: none;
      }

      /* ── 品牌徽章（左上） ── */
      .brand {
        position: absolute;
        left: 38px;
        top: 36px;
        background: rgba(8, 22, 48, 0.52);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(180, 210, 255, 0.28);
        border-radius: 16px;
        padding: 10px 18px;
      }
      .brand .cn {
        font-size: 52px;
        font-weight: 850;
        line-height: 1;
        letter-spacing: 2px;
        color: #e8f2ff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      .brand .en {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 1.5px;
        color: rgba(200, 225, 255, 0.82);
        margin-top: 4px;
      }

      /* ── 编号 badge（右上） ── */
      .ref-badge {
        position: absolute;
        right: 80px;
        top: 38px;
        background: rgba(255, 220, 100, 0.16);
        border: 1px solid rgba(255, 220, 100, 0.55);
        border-radius: 10px;
        padding: 7px 18px;
        font-size: 30px;
        font-weight: 700;
        color: #fde68a;
        letter-spacing: 0.5px;
      }

      /* ── 主信息卡片（底部） ── */
      .card {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 36px 48px 48px;
        background: linear-gradient(
          180deg,
          rgba(5, 12, 26, 0) 0%,
          rgba(5, 12, 26, 0.55) 22%,
          rgba(5, 12, 26, 0.98) 60%,
          #050c1a 100%
        );
      }

      /* 分页点（模拟可拖拽图集） */
      .dots {
        display: flex;
        gap: 10px;
        margin-bottom: 22px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.35);
      }
      .dot.active {
        width: 28px;
        border-radius: 5px;
        background: #fff;
      }

      /* 楼盘名 */
      .title {
        font-size: 90px;
        font-weight: 900;
        line-height: 1.05;
        color: #fff;
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
        max-height: 200px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      /* 户型标签 */
      .layout-tag {
        display: inline-block;
        background: rgba(255, 255, 255, 0.92);
        color: #0f3480;
        font-size: 46px;
        font-weight: 900;
        border-radius: 999px;
        padding: 8px 30px;
        margin-bottom: 24px;
        line-height: 1.2;
      }

      /* 信息行（位置 / 面积 / 楼层） */
      .info-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0 36px;
        font-size: 32px;
        font-weight: 600;
        color: rgba(210, 230, 255, 0.92);
        margin-bottom: 22px;
        line-height: 1.6;
      }
      .info-item {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 600px;
      }

      /* 高亮特征标签 */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 30px;
      }
      .tag {
        background: rgba(30, 70, 160, 0.62);
        border: 1px solid rgba(100, 160, 255, 0.45);
        border-radius: 10px;
        padding: 7px 20px;
        font-size: 28px;
        font-weight: 600;
        color: #a8d0ff;
      }

      /* 底部价格行 */
      .price-row {
        display: flex;
        align-items: baseline;
        gap: 16px;
      }
      .price-label {
        font-size: 28px;
        font-weight: 600;
        color: rgba(200, 220, 255, 0.7);
        letter-spacing: 0.04em;
      }
      .price {
        font-size: 96px;
        font-weight: 900;
        line-height: 1;
        color: #fde68a;
        text-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
        letter-spacing: -0.01em;
      }

      /* 「侨联认证」角标（价格行右侧）*/
      .verified-badge {
        margin-left: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(16, 185, 129, 0.18);
        border: 1.5px solid rgba(16, 185, 129, 0.55);
        border-radius: 14px;
        padding: 10px 22px;
        font-size: 24px;
        font-weight: 700;
        color: #6ee7b7;
        letter-spacing: 0.5px;
        gap: 4px;
      }
      .verified-badge .vicon {
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <div class="poster">
      <!-- 背景图 -->
      <img id="bg" class="bg" src="{{BG_SRC}}" alt="" />

      <!-- 遮罩 -->
      <div class="veil"></div>

      <!-- 右侧更多图片提示 -->
      <div class="side-strip">
        <span class="arrow">›</span>
        <span class="arrow" style="opacity:0.4;">›</span>
      </div>

      <!-- 品牌（左上） -->
      <div class="brand">
        <div class="cn">侨联地产</div>
        <div class="en">QIAO LIAN PROPERTY</div>
      </div>

      <!-- 编号 badge（右上） -->
      <div class="ref-badge" id="ref-badge">{{REF}}</div>

      <!-- 主信息卡 -->
      <div class="card">
        <!-- 分页点（模拟可拖拽图集） -->
        <div class="dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <!-- 楼盘名 -->
        <div class="title" id="t-title">{{PROJECT}}</div>

        <!-- 户型 -->
        <div class="layout-tag" id="t-layout">{{LAYOUT}}</div>

        <!-- 信息行 -->
        <div class="info-row">
          <span class="info-item" id="t-area">📍 {{AREA}}</span>
          <span class="info-item" id="t-size">📐 {{SIZE}}</span>
          <span class="info-item" id="t-floor">🔑 {{FLOOR}}</span>
        </div>

        <!-- 高亮标签 -->
        <div class="tags" id="tags-wrap">
          <span class="tag" id="t-h1">✅ {{H1}}</span>
          <span class="tag" id="t-h2">✅ {{H2}}</span>
          <span class="tag" id="t-h3">✅ {{H3}}</span>
        </div>

        <!-- 价格行 -->
        <div class="price-row">
          <span class="price-label">月租</span>
          <span class="price" id="t-price">{{PRICE_LINE}}</span>
          <div class="verified-badge">
            <span class="vicon">✔</span>
            <span>侨联认证</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      var EMPTY_REF_PATTERN = 'QC0000';
      var INVALID_STRINGS = ['可咨询', '金边'];

      function txt(id) {
        const el = document.getElementById(id);
        return (el ? String(el.textContent || '') : '').trim();
      }
      function bad(v) {
        const s = String(v || '').trim();
        const low = s.toLowerCase();
        return !s || s === '-' || s === '—' || s === '--' || low === 'n/a'
          || low === 'na' || INVALID_STRINGS.some(w => s.includes(w));
      }
      function hide(id) {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      }

      // 编号
      const refRaw = txt('ref-badge');
      if (!refRaw || refRaw.includes(EMPTY_REF_PATTERN)) hide('ref-badge');

      // 位置 / 面积 / 楼层
      if (bad(txt('t-area')))  hide('t-area');
      if (bad(txt('t-size')))  hide('t-size');
      if (bad(txt('t-floor'))) hide('t-floor');

      // 高亮标签
      const tagIds = ['t-h1', 't-h2', 't-h3'];
      let anyTag = false;
      tagIds.forEach(id => {
        const raw = txt(id).replace(/^✅\s*/, '');
        if (bad(raw)) {
          hide(id);
        } else {
          anyTag = true;
        }
      });
      if (!anyTag) hide('tags-wrap');

      // 户型
      if (bad(txt('t-layout'))) hide('t-layout');

      // 价格
      if (bad(txt('t-price'))) {
        const priceEl = document.getElementById('t-price');
        const labelEl = document.querySelector('.price-label');
        if (priceEl) priceEl.style.display = 'none';
        if (labelEl) labelEl.style.display = 'none';
      }
    </script>
  </body>
</html>
