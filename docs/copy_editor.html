<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>侨联地产 · 文案编辑页</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#111a31;
      --panel2:#16213d;
      --line:#253456;
      --text:#eaf0ff;
      --muted:#95a5c6;
      --accent:#f0c66b;
      --accent2:#6cc2ff;
      --danger:#ff7d7d;
      --ok:#79d39b;
      --code:#0f1730;
      --editor:#0c1327;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:
      radial-gradient(circle at top left, rgba(108,194,255,.15), transparent 28%),
      radial-gradient(circle at top right, rgba(240,198,107,.12), transparent 22%),
      var(--bg);
      color:var(--text);
      font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    a{color:var(--accent2);text-decoration:none}
    .wrap{max-width:1600px;margin:0 auto;padding:24px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:18px 20px;border:1px solid var(--line);border-radius:18px;background:rgba(17,26,49,.9);
      position:sticky;top:14px;backdrop-filter: blur(10px); z-index:20;
    }
    .brand{display:flex;flex-direction:column;gap:4px}
    .brand h1{margin:0;font-size:20px;letter-spacing:.5px}
    .brand p{margin:0;color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      border:1px solid var(--line);background:linear-gradient(180deg, rgba(22,33,61,.95), rgba(14,20,38,.95));
      color:var(--text);padding:10px 14px;border-radius:12px;font-size:13px;cursor:pointer;
    }
    .btn.primary{background:linear-gradient(135deg,#d7ab49,#f1d78a);color:#1a1300;border-color:transparent;font-weight:700}
    .btn:hover{border-color:var(--accent)}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:18px;margin-top:18px}
    .panel{background:rgba(17,26,49,.88);border:1px solid var(--line);border-radius:18px;overflow:hidden}
    .panel .hd{padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(22,33,61,.75);font-size:14px;font-weight:700}
    .panel .bd{padding:16px 18px}
    .tree{display:flex;flex-direction:column;gap:12px}
    .tree-node{
      border:1px solid var(--line);border-radius:14px;padding:12px 12px;background:rgba(12,19,39,.75)
    }
    .tree-node .t{font-weight:700;margin-bottom:6px}
    .tree-node .s{font-size:12px;color:var(--muted);line-height:1.6}
    .arrow{margin:2px 0 2px 18px;color:var(--accent2);font-size:18px}
    .legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .tag{font-size:12px;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted)}
    .tag.ok{color:var(--ok);border-color:rgba(121,211,155,.35)}
    .tag.warn{color:var(--accent);border-color:rgba(240,198,107,.35)}
    .tag.info{color:var(--accent2);border-color:rgba(108,194,255,.35)}
    .batch-nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .batch-btn{
      border:1px solid var(--line);background:rgba(15,23,48,.9);color:var(--text);
      border-radius:999px;padding:8px 12px;font-size:12px;cursor:pointer;
    }
    .batch-btn.active{background:linear-gradient(135deg,#d7ab49,#f1d78a);color:#201700;border-color:transparent;font-weight:700}
    .batch-meta{margin-top:10px;font-size:12px;line-height:1.7;color:var(--muted)}
    .cats{display:grid;grid-template-columns:1fr;gap:14px}
    .cat{border:1px solid var(--line);border-radius:16px;background:rgba(12,19,39,.7);overflow:hidden}
    .cat-hd{padding:12px 14px;background:rgba(22,33,61,.7);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .cat-hd strong{font-size:14px}
    .cat-hd span{font-size:12px;color:var(--muted)}
    .item{border-top:1px solid rgba(37,52,86,.8);padding:14px}
    .item:first-of-type{border-top:none}
    .item-grid{display:grid;grid-template-columns:1fr 280px;gap:12px}
    .item-name{font-size:14px;font-weight:700;margin-bottom:6px}
    .source{font-size:12px;color:var(--accent2);margin-bottom:10px}
    .item textarea{
      width:100%;min-height:88px;resize:vertical;border:1px solid var(--line);border-radius:12px;
      background:linear-gradient(180deg, rgba(15,23,48,.95), rgba(10,15,32,.95));
      color:var(--text);padding:12px 13px;font-size:13px;line-height:1.7;outline:none;
    }
    .item textarea:focus{border-color:var(--accent)}
    .mini{
      display:flex;flex-direction:column;gap:8px
    }
    .mini .box{
      border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(15,23,48,.8);
      font-size:12px;line-height:1.65;color:var(--muted)
    }
    .mini .box b{color:var(--text)}
    .export{
      display:grid;grid-template-columns:1fr 1fr;gap:12px
    }
    .export textarea{min-height:180px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .footer{
      margin-top:18px;color:var(--muted);font-size:12px;line-height:1.8;
      border-top:1px solid var(--line);padding-top:14px
    }
    @media (max-width: 1200px){
      .grid{grid-template-columns:1fr}
      .item-grid,.export{grid-template-columns:1fr}
      .topbar{position:static}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>侨联地产 · 流程树文案编辑页</h1>
        <p>左边看流程，右边改文案。复制后可直接回填到对应源码文件。</p>
      </div>
      <div class="actions">
        <button class="btn primary" onclick="copyMarkdown()">复制 Markdown 预览</button>
        <button class="btn" onclick="copyJSON()">复制 JSON 数据</button>
        <button class="btn" onclick="resetAll()">恢复初始文案</button>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="hd">流程树</div>
        <div class="bd">
          <div class="tree">
            <div class="tree-node">
              <div class="t">频道</div>
              <div class="s">封面图、频道主帖、CTA 按钮、置顶说明</div>
            </div>
            <div class="arrow">↓</div>
            <div class="tree-node">
              <div class="t">Bot A · 用户留资</div>
              <div class="s">咨询、预约、收藏、同区域更多、找房、顾问联系</div>
            </div>
            <div class="arrow">↓</div>
            <div class="tree-node">
              <div class="t">人类顾问</div>
              <div class="s">转人工、跟进询价、视频看房、约看确认、补充信息</div>
            </div>
            <div class="arrow">↓</div>
            <div class="tree-node">
              <div class="t">入住后服务</div>
              <div class="s">维修、续租、退租、押金、搬入、租客沟通</div>
            </div>
            <div class="legend">
              <span class="tag ok">可直接改稿</span>
              <span class="tag info">支持导出</span>
              <span class="tag warn">不影响运行</span>
            </div>
          </div>
          <div class="batch-nav" id="batchNav"></div>
          <div class="batch-meta" id="batchMeta"></div>
        </div>
      </section>

      <section class="panel">
        <div class="hd">文案清单</div>
        <div class="bd">
          <div class="cats" id="categories"></div>

          <div class="panel" style="margin-top:14px">
            <div class="hd">导出区</div>
            <div class="bd export">
              <div>
                <div class="item-name">Markdown 预览</div>
                <textarea id="markdownOut" readonly></textarea>
              </div>
              <div>
                <div class="item-name">JSON 数据</div>
                <textarea id="jsonOut" readonly></textarea>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="footer">
      说明：这个页面是静态文案工作台，不连接后端，不修改运行逻辑。修改后可把内容复制回源码或交给营销直接审稿。
    </div>
  </div>

  <div id="toast" style="
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
    background:rgba(17,26,49,.92);border:1px solid var(--line);color:var(--text);
    padding:10px 14px;border-radius:12px;font-size:13px;backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    opacity:0;pointer-events:none;transition:opacity .18s ease;
    z-index:9999;

          { text: "下方四个按钮：品牌故事、介绍侨联、预约想住、咨询", source: "autopilot_publish_bot.py:L263-L267" },

          { text: "频道发置顶菜单帖（四按钮）并尝试置顶", source: "v2/qiaolian_publisher_v2/bot.py:L859-L860" },
          { text: "品牌故事、介绍侨联、预约想住、咨询", source: "autopilot_publish_bot.py:L263-L267" },
          { text: "@QiaolianHouseBot", source: "meihua_publisher.py:L63-L64" },
        ],
      },
    ];

    const batches = [
      {
        key: "bot_a",
        title: "第一批 · Bot A 留资",
        note: "欢迎语、咨询、预约、找房、fallback",
        cats: ["greeting", "conversation", "booking", "fallback"],
      },
      {
        key: "channel",
        title: "第二批 · 频道发布",
        note: "主帖模板、按钮、CTA、封面图文案",
        cats: ["listing", "buttons", "cover", "cta"],
      },
      {
        key: "admin",
        title: "第三批 · 后台与运维",
        note: "管理后台、发布向导、系统提示",
        cats: ["admin"],
      },
    ];

    const state = structuredClone(inventory);
    let currentBatch = batches[0].key;

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function getBatch() {
      return batches.find((b) => b.key === currentBatch) || batches[0];
    }

    function getVisibleCats() {
      const batch = getBatch();
      const wanted = new Set(batch.cats);
      return state.filter((cat) => wanted.has(cat.key));
    }

    function renderBatchNav() {
      const root = document.getElementById("batchNav");
      const meta = document.getElementById("batchMeta");
      if (!root || !meta) return;
      root.innerHTML = "";
      batches.forEach((batch) => {
        const btn = document.createElement("button");
        btn.className = `batch-btn${batch.key === currentBatch ? " active" : ""}`;
        btn.textContent = batch.title;
        btn.title = batch.note;
        btn.onclick = () => {
          currentBatch = batch.key;
          render();
        };
        root.appendChild(btn);
      });
      const batch = getBatch();
      const visible = getVisibleCats();
      meta.innerHTML = `<b>${escapeHtml(batch.title)}</b><br/>${escapeHtml(batch.note)} · 当前显示 ${visible.length} 个分类，修改后导出也只包含这一批。`;
    }

    function render() {
      const root = document.getElementById("categories");
      root.innerHTML = "";
      renderBatchNav();
      for (const cat of getVisibleCats()) {
        const el = document.createElement("div");
        el.className = "cat";
        el.innerHTML = `
          <div class="cat-hd">
            <div>
              <strong>${escapeHtml(cat.title)}</strong><br/>
              <span>${escapeHtml(cat.note)}</span>
            </div>
            <div class="tag info">${cat.items.length} 条</div>
          </div>
        `;
        cat.items.forEach((item, idx) => {
          const itemEl = document.createElement("div");
          itemEl.className = "item";
          itemEl.innerHTML = `
            <div class="item-grid">
              <div>
                <div class="item-name">${escapeHtml(item.text)}</div>
                <div class="source">source: ${escapeHtml(item.source)}</div>
                <textarea data-cat="${cat.key}" data-idx="${idx}">${escapeHtml(item.text)}</textarea>
              </div>
              <div class="mini">
                <div class="box"><b>分类</b><br/>${escapeHtml(cat.title)}</div>
                <div class="box"><b>来源</b><br/>${escapeHtml(item.source)}</div>
              </div>
            </div>
          `;
          el.appendChild(itemEl);
        });
        root.appendChild(el);
      }

      document.querySelectorAll("textarea[data-cat]").forEach((ta) => {
        ta.addEventListener("input", (ev) => {
          const cat = state.find((c) => c.key === ev.target.dataset.cat);
          if (!cat) return;
          const item = cat.items[Number(ev.target.dataset.idx)];
          if (!item) return;
          item.text = ev.target.value;
          updateExports();
        });
      });
      updateExports();
    }

    function updateExports() {
      const batch = getBatch();
      const visible = getVisibleCats();
      const md = [
        "# Copy Inventory",
        "",
        `> 当前批次：${batch.title}`,
        `> ${batch.note}`,
        "",
        "> 说明：同一文案在不同文件里可能重复出现，本清单按“可见文本”收录，方便后续统一改稿。",
        "",
      ];
      for (const cat of visible) {
        md.push(`## ${cat.title}`, "");
        for (const item of cat.items) {
          md.push(`- \`${item.text.replaceAll("`", "\\`")}\``, `  - source: \`${item.source}\``);
        }
        md.push("");
      }
      document.getElementById("markdownOut").value = md.join("\n").trim() + "\n";
      document.getElementById("jsonOut").value = JSON.stringify(
        {
          batch: { key: batch.key, title: batch.title, note: batch.note },
          categories: visible,
        },
        null,
        2
      );
    }

    let toastTimer = null;
    function toast(msg, type = "ok") {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg;
      el.style.borderColor =
        type === "err" ? "rgba(255,125,125,.45)" :
        type === "warn" ? "rgba(240,198,107,.45)" :
        "rgba(121,211,155,.45)";
      el.style.opacity = "1";
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.style.opacity = "0"; }, 1400);
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) {}

      // Fallback for file:// and older browsers
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.top = "-1000px";
        ta.style.left = "-1000px";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      } catch (_) {
        return false;
      }
    }

    async function copyMarkdown() {
      const ok = await copyText(document.getElementById("markdownOut").value);
      toast(ok ? "Markdown 已复制" : "复制失败：请手动全选复制", ok ? "ok" : "err");
    }
    async function copyJSON() {
      const ok = await copyText(document.getElementById("jsonOut").value);
      toast(ok ? "JSON 已复制" : "复制失败：请手动全选复制", ok ? "ok" : "err");
    }
    function resetAll() {
      location.reload();
    }

    render();
  </script>
