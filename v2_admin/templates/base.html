<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}侨联地产 · 频道发布后台{% endblock %}</title>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --dark: #0D0D0D;
  --dark2: #161616;
  --dark3: #1F1F1F;
  --dark4: #2A2A2A;
  --border: #2E2E2E;
  --text: #E8E8E8;
  --text-dim: #888;
  --text-muted: #555;
  --green: #4CAF7D;
  --red: #E06C6C;
  --blue: #5B9BD5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; min-height: 100vh; }

/* ── Header ── */
.hdr {
  background: var(--dark2);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.hdr-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #000;
}
.hdr-name { font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: 1.5px; }
.hdr-sub  { font-size: 10px; color: var(--text-muted); font-family: monospace; }
.hdr-nav  { margin-left: auto; display: flex; gap: 8px; }
.hdr-nav a {
  color: var(--text-dim); font-size: 12px; text-decoration: none;
  padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
  transition: all .2s;
}
.hdr-nav a:hover { border-color: var(--gold); color: var(--gold); }
.hdr-nav a.primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #000; border-color: transparent; font-weight: 600;
}

/* ── Container ── */
.container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

/* ── Flash Messages ── */
.flash-wrap { padding: 0 24px; max-width: 1100px; margin: 0 auto; }
.flash {
  padding: 10px 16px; border-radius: 7px; margin: 12px 0 0;
  font-size: 13px; border: 1px solid;
}
.flash.success { background: rgba(76,175,125,.1); border-color: var(--green); color: var(--green); }
.flash.error   { background: rgba(224,108,108,.1); border-color: var(--red);   color: var(--red);   }
.flash.info    { background: rgba(91,155,213,.1); border-color: var(--blue);  color: var(--blue);  }

/* ── Section Label ── */
.sec-label {
  font-size: 10px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase;
  font-family: monospace; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Card ── */
.card {
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-bottom: 16px;
}
.card-hdr {
  padding: 10px 16px; background: var(--dark3);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.card-title { font-size: 12px; color: var(--gold); font-family: monospace; letter-spacing: 1px; }
.card-body  { padding: 18px 16px; }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
.badge-draft   { background: rgba(136,136,136,.15); color: var(--text-dim); }
.badge-pub     { background: rgba(76,175,125,.15);  color: var(--green); }
.badge-rented  { background: rgba(91,155,213,.15);  color: var(--blue);  }
.badge-off     { background: rgba(224,108,108,.15); color: var(--red);   }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: var(--dark4); color: var(--text-dim);
  text-decoration: none; transition: all .2s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #000; border-color: transparent; font-weight: 600;
}
.btn-primary:hover { opacity: .88; color: #000; }
.btn-danger  { border-color: #5a2020; color: var(--red); }
.btn-danger:hover { background: rgba(224,108,108,.1); border-color: var(--red); }
.btn-blue    { border-color: #1a3a5a; color: var(--blue); }
.btn-blue:hover { background: rgba(91,155,213,.1); border-color: var(--blue); }
.btn-green   { border-color: #1a4a2a; color: var(--green); }
.btn-green:hover { background: rgba(76,175,125,.1); border-color: var(--green); }
.btn-sm { padding: 4px 9px; font-size: 11px; }

/* ── Forms ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
.form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.span2 { grid-column: 1 / -1; }
.form-group label { font-size: 11px; color: var(--text-dim); font-family: monospace; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--dark3); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: 13px;
  outline: none; transition: border-color .2s; width: 100%;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--gold);
}
.form-group textarea { resize: vertical; min-height: 68px; }
.form-group select option { background: var(--dark3); }
.form-hint { font-size: 10px; color: var(--text-muted); }

/* ── Table ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  padding: 8px 12px; text-align: left;
  font-size: 10px; color: var(--text-muted); font-family: monospace; letter-spacing: 1px;
  border-bottom: 1px solid var(--border); font-weight: 400;
}
.tbl td { padding: 10px 12px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: rgba(255,255,255,.02); }

/* ── Image Preview ── */
.img-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.img-thumb {
  width: 72px; height: 60px; border-radius: 6px; object-fit: cover;
  border: 1px solid var(--border);
}
.img-thumb-wrap { position: relative; }
.img-del {
  position: absolute; top: -4px; right: -4px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--red); color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none;
}

/* ── Filter Tabs ── */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 18px; }
.filter-tab {
  padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); text-decoration: none; transition: all .2s;
}
.filter-tab:hover, .filter-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.06); }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 22px; min-width: 300px; }
.modal h3 { font-size: 14px; color: var(--gold); margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

@media (max-width: 700px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-grid.cols3 { grid-template-columns: 1fr 1fr; }
  .container { padding: 16px 12px; }
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">侨</div>
  <div>
    <div class="hdr-name">侨联地产</div>
    <div class="hdr-sub">CHANNEL PUBLISHER · 频道发布后台</div>
  </div>
  <nav class="hdr-nav">
    <a href="/">🏠 房源列表</a>
    <a href="/new" class="primary">＋ 新建房源</a>
  </nav>
</header>

<div class="flash-wrap">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}
</div>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}
</body>
</html>
